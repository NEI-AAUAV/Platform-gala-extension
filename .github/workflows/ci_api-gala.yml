name: Test api-gala

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci_api-gala.yml"
      - "api-gala/**"
  pull_request:
    paths:
      - ".github/workflows/ci_api-gala.yml"
      - "api-gala/**"
  workflow_dispatch:

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pip install -U poetry

      - name: Install dependencies
        working-directory: api-gala
        run: |
          poetry lock --no-update
          poetry install --no-interaction --no-root

      - name: Run tests
        working-directory: api-gala
        run: poetry run pytest --tb=short
