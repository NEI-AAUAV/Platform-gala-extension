services:
  web_nei:
    environment:
      ENABLE_GALA: 'True'

  api_gala:
    image: ghcr.io/nei-aauav/api-gala:${TAG:-latest}
    build:
      context: extensions/gala/api-gala
      dockerfile: Dockerfile.prod
    environment:
      EMAIL_ENABLED: ${EMAIL_ENABLED:-True}
      EMAIL_SENDER_ADDRESS: ${EMAIL_SENDER_ADDRESS}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD}
      MONGO_SERVER: db_mongo
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      JWT_PUBLIC_KEY_PATH: /jwt.key.pub
      ALLOW_TIME_SLOTS_PAST: 'True'
      ENV: production
      AUTHENTIK_URL: ${AUTHENTIK_URL:-https://nei.web.ua.pt/authentik}
      AUTHENTIK_TOKEN: ${AUTHENTIK_TOKEN}
      AUTHENTIK_MANAGER_GALA_GROUP: nei-manager-gala
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL}
    volumes:
      - /deploy/keys/jwt.key.pub:/jwt.key.pub:ro
    depends_on:
      db_mongo:
        condition: service_healthy
    networks:
      - backend
    restart: always

  web_gala:
    image: ghcr.io/nei-aauav/web-gala:${TAG:-latest}
    build:
      context: extensions/gala/web-gala
      dockerfile: Dockerfile.prod
    ports:
      - 3002:3002
    networks:
      - frontend
    restart: always
