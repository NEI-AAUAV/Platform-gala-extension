<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}NEI Gala{% endblock %}</title>
  <style>
    *{box-sizing:border-box}
    body{background:#182c2a;font-family:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;color:#c1cac9;padding:24px 12px}
    .w{max-width:640px;margin:0 auto;background:#203836;border:1px solid rgba(201,168,67,.28);border-radius:14px;padding:24px}
    .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .brand-wrap{display:flex;align-items:center;gap:10px}
    .brand-logo{height:34px;width:34px;border-radius:8px;display:block}
    .brand{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#c9a843}
    .brand strong{color:#c1cac9;font-weight:800;letter-spacing:0}
    .band{background:linear-gradient(140deg,rgba(138,106,32,.24) 0%,rgba(201,168,67,.12) 100%);border:1px solid rgba(201,168,67,.35);border-left:5px solid #c9a843;border-radius:10px;padding:18px 18px;margin-bottom:22px}
    .band-label{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#c9a843;margin-bottom:6px}
    .band-title{font-size:22px;font-weight:800;color:#c9a843;line-height:1.2}
    .band-sub{margin-top:8px;font-size:16px;line-height:1.55;color:rgba(193,202,201,.9)}
    .band.green{background:linear-gradient(140deg,rgba(32,56,54,.75) 0%,rgba(53,90,86,.55) 100%);border:1px solid rgba(53,90,86,.7);border-left:5px solid #355a56}
    .band.green .band-label{color:#c1cac9}
    .band.green .band-title{color:#c1cac9}

    .sec{margin-bottom:18px}
    .sec-label{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#c9a843;margin-bottom:8px}
    .card{border:1px solid rgba(201,168,67,.2);border-radius:10px;overflow:hidden;background:rgba(193,202,201,.03)}
    .row{display:flex;justify-content:space-between;gap:14px;padding:11px 13px;border-top:1px solid rgba(193,202,201,.1)}
    .row:first-child{border-top:0}
    .rl{font-size:14px;color:rgba(193,202,201,.7);white-space:nowrap}
    .rv{font-size:14px;font-weight:600;color:#c1cac9;text-align:right}
    .rv.g{color:#c9a843}
    .rv.green{color:#198754}
    .comp-card{border:1px solid rgba(201,168,67,.18);background:rgba(193,202,201,.03);border-radius:10px;padding:10px 12px;margin-bottom:8px}
    .comp-name{font-size:14px;font-weight:600;color:#c1cac9;margin-bottom:2px}
    .comp-meta{font-size:12px;color:rgba(193,202,201,.72)}

    hr{border:none;border-top:1px solid rgba(193,202,201,.12);margin:18px 0}
    .notice{font-size:13px;color:rgba(193,202,201,.82);line-height:1.7;font-style:italic}
    a{color:#c9a843;text-decoration:none}

    .ftr{margin-top:20px;padding-top:12px;border-top:1px solid rgba(193,202,201,.12);text-align:center}
    .ftr-copy{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:rgba(193,202,201,.62);margin-bottom:4px}
    .ftr-sub{display:block;font-size:12px;color:rgba(193,202,201,.5)}
  </style>
</head>
<body style="margin:0;padding:24px 12px;background:#182c2a;color:#c1cac9;">
<div class="w" style="max-width:640px;margin:0 auto;background:#203836;border:1px solid rgba(201,168,67,.28);border-radius:14px;padding:24px;">
  <div class="hdr">
    <div class="brand-wrap">
      <img src="cid:logo" alt="NEI" class="brand-logo" />
      <span class="brand">NEI <strong>Gala</strong></span>
    </div>
  </div>

  {% block content %}{% endblock %}

  <div class="ftr">
    <span class="ftr-copy">Mensagem automática • Não responder</span>
    <span class="ftr-sub">Núcleo de Estudantes de Informática • Universidade de Aveiro</span>
  </div>
</div>
</body>
</html>
