<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html lang="pt">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}{% endblock %} — Jantar de Gala</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0a;font-family:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;color:#ffffff;padding:24px 12px}
    .w{max-width:640px;margin:0 auto;background:#111111;border:1px solid rgba(247,187,172,.18);border-radius:14px;padding:24px}
    .hdr{padding-bottom:18px;border-bottom:1px solid rgba(247,187,172,.15);margin-bottom:24px}
    .brand{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#F7BBAC}
    .brand strong{color:#ffffff;font-weight:800;letter-spacing:0}
    .band{background:linear-gradient(140deg,rgba(197,134,118,.16) 0%,rgba(247,187,172,.07) 100%);border:1px solid rgba(247,187,172,.25);border-left:5px solid #C58676;border-radius:10px;padding:18px 18px;margin-bottom:22px}
    .band-label{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#F7BBAC;margin-bottom:6px}
    .band-title{font-size:22px;font-weight:800;color:#F7BBAC;line-height:1.2}
    .band-sub{margin-top:8px;font-size:16px;line-height:1.55;color:rgba(255,255,255,.82)}
    .band.green{background:linear-gradient(140deg,rgba(25,135,84,.20) 0%,rgba(25,135,84,.08) 100%);border:1px solid rgba(25,135,84,.35);border-left:5px solid #198754}
    .band.green .band-label{color:#86efac}
    .band.green .band-title{color:#86efac}
    .sec{margin-bottom:18px}
    .sec-label{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#F7BBAC;margin-bottom:8px}
    .card{border:1px solid rgba(247,187,172,.15);border-radius:10px;overflow:hidden;background:rgba(255,255,255,.02)}
    .row{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08);gap:12px}
    .row:last-child{border-bottom:none}
    .rl{font-size:14px;color:rgba(255,255,255,.62);white-space:nowrap}
    .rv{font-size:14px;font-weight:600;color:#ffffff;text-align:right}
    .rv.g{color:#F7BBAC}
    .rv.green{color:#86efac}
    .comp-card{border:1px solid rgba(247,187,172,.14);background:rgba(255,255,255,.03);border-radius:10px;padding:10px 12px;margin-bottom:8px}
    .comp-name{font-size:14px;font-weight:600;color:#ffffff;margin-bottom:2px}
    .comp-meta{font-size:12px;color:rgba(255,255,255,.65)}
    hr{border:none;border-top:1px solid rgba(247,187,172,.15);margin:22px 0}
    .notice{font-size:13px;color:rgba(255,255,255,.75);line-height:1.7;font-style:italic}
    a{color:#F7BBAC;text-decoration:none}
    a:hover{text-decoration:underline}
    .ftr{margin-top:28px;padding-top:18px;border-top:1px solid rgba(247,187,172,.15)}
    .ftr-grid{display:table;width:100%;margin-bottom:16px}
    .ftr-col{display:table-cell;vertical-align:top;width:33.33%;padding-right:10px}
    .ftr-col:last-child{padding-right:0}
    .ftr-col-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#F7BBAC;margin-bottom:8px}
    .ftr-link{display:block;font-size:14px;color:rgba(255,255,255,.85);text-decoration:none;margin-bottom:6px}
    .ftr-bottom{border-top:1px solid rgba(247,187,172,.12);padding-top:12px}
    .ftr-copy{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.58);margin-bottom:4px}
    {% block style %}{% endblock %}
  </style>
</head>
<body style="margin:0;padding:24px 12px;background:#0a0a0a;color:#ffffff;">
<div class="w" style="max-width:640px;margin:0 auto;background:#111111;border:1px solid rgba(247,187,172,.18);border-radius:14px;padding:24px;">

  <!-- Header -->
  <div class="hdr">
    <span class="brand"><strong>NEI-AAUAv</strong>  Jantar de Gala</span>
  </div>

  {% block content %}{% endblock %}

  <!-- Footer -->
  <div class="ftr">
    <div class="ftr-grid">
      <div class="ftr-col">
        <p class="ftr-col-title">Navegação</p>
        <a class="ftr-link" href="{{PUBLIC_URL}}/gala">Início</a>
        <a class="ftr-link" href="{{PUBLIC_URL}}/gala/register">Inscrição</a>
        <a class="ftr-link" href="{{PUBLIC_URL}}/gala/reserve">Mesas</a>
        <a class="ftr-link" href="{{PUBLIC_URL}}/gala/vote">Votar</a>
      </div>
      <div class="ftr-col">
        <p class="ftr-col-title">Contacto</p>
        <a class="ftr-link" href="mailto:nei@aauav.pt">nei@aauav.pt</a>
        <a class="ftr-link" href="https://goo.gl/maps/JZY6mi3T9T6UxE3z6">Aveiro, Portugal</a>
      </div>
      <div class="ftr-col">
        <p class="ftr-col-title">Redes Sociais</p>
        <a class="ftr-link" href="https://www.instagram.com/nei.aauav/">Instagram</a>
        <a class="ftr-link" href="https://www.linkedin.com/company/nei-aauav/">LinkedIn</a>
        <a class="ftr-link" href="https://www.facebook.com/NEIAAUAv">Facebook</a>
      </div>
    </div>
    <div class="ftr-bottom">
      <span class="ftr-copy">&copy; 2026 NEI-AAUAv. Todos os direitos reservados.</span>
      <span class="ftr-copy">A apoiar os estudantes desde 2013.</span>
    </div>
  </div>

</div>
</body>
</html>
